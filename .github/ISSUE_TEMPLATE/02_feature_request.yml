name: Feature request
description: Suggest a new capability or improvement.
title: "[Feature]: "
labels: ["type: feature"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing: lead with the problem you're trying to solve, not the solution. We'll explore solutions together.

  - type: checkboxes
    id: duplicate-check
    attributes:
      label: Duplicate check
      options:
        - label: I searched existing issues and discussions and this idea is not already proposed.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? Who hits it?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Your best guess at what the fix looks like. OK to be rough.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they're weaker.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, examples from other tools.

  - type: checkboxes
    id: willing-to-pr
    attributes:
      label: Willing to submit a PR?
      options:
        - label: I'd be willing to contribute this feature if the maintainers agree on direction.
